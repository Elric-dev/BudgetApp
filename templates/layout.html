<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caronte Budget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div id="sidebar" class="d-flex flex-column p-3">
        <h4 class="text-info mb-4">Budget Tracker v3.4</h4>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="/" class="nav-link"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
            </li>
            <li>
                <a href="/transactions" class="nav-link"><i class="bi bi-list-check me-2"></i> Expense Tracker</a>
            </li>
            <li>
                <a href="/budget" class="nav-link"><i class="bi bi-wallet2 me-2"></i> Budget Planner</a>
            </li>
            <li>
                <a href="/networth" class="nav-link"><i class="bi bi-graph-up-arrow me-2"></i> Net Worth</a>
            </li>
            <hr>
            <li>
                <a href="/input" class="nav-link"><i class="bi bi-plus-circle me-2"></i> Add Entry</a>
            </li>
            <li>
                <a href="/cleanup" class="nav-link"><i class="bi bi-brush me-2"></i> Cleanup</a>
            </li>
            <hr>
            <li>
                <a href="/logout" class="nav-link text-danger"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
            </li>
        </ul>
    </div>
    <div id="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
