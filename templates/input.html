{% extends "layout.html" %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <!-- Manual Expense Entry -->
        <div class="col-md-7 mb-4">
            <div class="card h-100 shadow-lg">
                <div class="card-header bg-primary py-3">
                    <h5 class="mb-0 fw-bold text-white"><i class="bi bi-pencil-square me-2"></i>Manual Expense Entry</h5>
                </div>
                <div class="card-body p-4">
                    <form id="manualForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date</label>
                                <input type="date" id="expDate" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <select id="expCat" class="form-select" onchange="calculateImpact()">
                                    {% for cat in expense_categories %}
                                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <input type="text" id="expDesc" class="form-control" placeholder="e.g. Weekly Groceries" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Total Amount (€)</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text text-success fw-bold">€</span>
                                <input type="number" step="0.01" id="expAmt" class="form-control" placeholder="0.00" oninput="calculateImpact()" required>
                            </div>
                        </div>

                        <div class="p-3 rounded border border-secondary mb-4 bg-black">
                            <label class="form-label d-flex justify-content-between">
                                Cost Split Logic
                                <span class="text-info fw-bold" id="split-label">50/50 Split</span>
                            </label>
                            
                            <div class="btn-group w-100 mb-3" role="group">
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="setSplit(50, 50)">Equal (50/50)</button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="setSplit(100, 0)">Only Gus</button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="setSplit(0, 100)">Only Joules</button>
                            </div>

                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="input-group">
                                        <span class="input-group-text text-cyan">Gus</span>
                                        <input type="number" id="splitGus" class="form-control text-center" value="50" oninput="syncSplit('gus')">
                                        <span class="input-group-text">%</span>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="input-group">
                                        <span class="input-group-text text-pink" style="color: #ff69b4 !important;">Joules</span>
                                        <input type="number" id="splitJoules" class="form-control text-center" value="50" oninput="syncSplit('joules')">
                                        <span class="input-group-text">%</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between">
                                Individual Budget Impact
                                <span id="impact-percent" class="text-info">0%</span>
                            </label>
                            <div class="progress" style="height: 8px;">
                                <div id="impact-bar" class="progress-bar bg-info" style="width: 0%"></div>
                            </div>
                        </div>

                        <div class="mb-4 d-flex align-items-center">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="pushToSplitwise">
                                <label class="form-check-label text-info fw-bold ms-2" for="pushToSplitwise">
                                    <i class="bi bi-send-plus me-1"></i>ALSO PUSH TO SPLITWISE
                                </label>
                            </div>
                        </div>

                        <button type="button" id="saveBtn" onclick="saveExpense()" class="btn btn-primary w-100 fw-bold py-3">
                            <i class="bi bi-cloud-arrow-up-fill me-2"></i>SAVE TRANSACTION
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Log a Saving/Investment -->
        <div class="col-md-5 mb-4">
            <div class="card h-100 shadow-lg mb-4">
                <div class="card-header bg-success py-3">
                    <h5 class="mb-0 fw-bold text-white"><i class="bi bi-piggy-bank me-2"></i>Log a Saving/Investment</h5>
                </div>
                <div class="card-body p-4">
                    <form id="savingsForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date</label>
                                <input type="date" id="savDate" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Category</label>
                                <select id="savCat" class="form-select">
                                    {% for cat in savings_categories %}
                                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description (Optional)</label>
                            <input type="text" id="savDesc" class="form-control" placeholder="e.g. Monthly contribution">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Amount (€)</label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text text-success fw-bold">€</span>
                                <input type="number" step="0.01" id="savAmt" class="form-control" placeholder="0.00" required>
                            </div>
                        </div>

                        <button type="button" onclick="saveSaving()" class="btn btn-success w-100 fw-bold py-3">
                            <i class="bi bi-cloud-arrow-up-fill me-2"></i>LOG SAVING
                        </button>
                    </form>
                </div>
            </div>

            <!-- Sync Status & API -->
            <div class="card shadow-lg border-0 bg-dark mt-4">
                <div class="card-body p-4">
                    <div class="text-center mb-3">
                        <h6 class="text-info fw-bold">Splitwise API Sync</h6>
                        <p class="text-muted small">Fetch latest data from Splitwise.</p>
                    </div>
                    <button type="button" id="apiSyncBtn" onclick="syncSplitwise()" class="btn btn-outline-info w-100 fw-bold py-2">
                        <i class="bi bi-arrow-repeat me-2"></i>START SYNC
                    </button>
                    <div id="apiSyncStatus" class="mt-3 text-center small"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let budgetTargets = {};

async function syncSplitwise() {
    const btn = document.getElementById('apiSyncBtn');
    const status = document.getElementById('apiSyncStatus');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>SYNCING...';
    try {
        const res = await fetch('/api/sync_splitwise', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
            status.innerHTML = `<span class="text-success fw-bold"><i class="bi bi-check-circle"></i> ${data.status}</span>`;
        } else {
            status.innerHTML = `<span class="text-danger">Error: ${data.error}</span>`;
        }
    } catch (err) {
        status.innerHTML = `<span class="text-danger">Sync failed.</span>`;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-arrow-repeat me-2"></i>START SYNC';
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('expDate').valueAsDate = new Date();
    document.getElementById('savDate').valueAsDate = new Date();
    
    // Fetch budget targets for Gus (user_id 0) to show impact
    const res = await fetch(`/api/budget/list?user_id=0`);
    const data = await res.json();
    data.forEach(item => { budgetTargets[item.id] = item.amount; });
});

function setSplit(gus, joules) {
    document.getElementById('splitGus').value = gus;
    document.getElementById('splitJoules').value = joules;
    updateSplitLabel();
    calculateImpact();
}

function syncSplit(origin) {
    let gusInput = document.getElementById('splitGus');
    let joulesInput = document.getElementById('splitJoules');
    if (origin === 'gus') {
        let val = Math.min(Math.max(parseFloat(gusInput.value) || 0, 0), 100);
        gusInput.value = val;
        joulesInput.value = (100 - val);
    } else {
        let val = Math.min(Math.max(parseFloat(joulesInput.value) || 0, 0), 100);
        joulesInput.value = val;
        gusInput.value = (100 - val);
    }
    updateSplitLabel();
    calculateImpact();
}

function updateSplitLabel() {
    const gus = document.getElementById('splitGus').value;
    const joules = document.getElementById('splitJoules').value;
    document.getElementById('split-label').innerText = `${gus}/${joules} Split`;
}

function calculateImpact() {
    const totalAmount = parseFloat(document.getElementById('expAmt').value) || 0;
    const gusShare = parseFloat(document.getElementById('splitGus').value) / 100;
    const myAmount = totalAmount * gusShare;
    const catId = document.getElementById('expCat').value;
    const target = budgetTargets[catId] || 0;
    const bar = document.getElementById('impact-bar');
    const label = document.getElementById('impact-percent');

    if (target > 0) {
        const pct = (myAmount / target) * 100;
        bar.style.width = Math.min(pct, 100) + '%';
        label.innerText = pct.toFixed(1) + '%';
        if (pct > 80) bar.className = "progress-bar bg-danger";
        else if (pct > 40) bar.className = "progress-bar bg-warning";
        else bar.className = "progress-bar bg-info";
    } else {
        bar.style.width = '0%';
        label.innerText = 'No Target Set';
    }
}

async function saveExpense() {
    const catSelect = document.getElementById('expCat');
    const pushSwitch = document.getElementById('pushToSplitwise');
    const saveBtn = document.getElementById('saveBtn');
    
    const payload = {
        date: document.getElementById('expDate').value,
        description: document.getElementById('expDesc').value,
        amount: parseFloat(document.getElementById('expAmt').value),
        category_id: catSelect.value,
        category_name: catSelect.options[catSelect.selectedIndex].text,
        split_gus: parseFloat(document.getElementById('splitGus').value),
        split_joules: parseFloat(document.getElementById('splitJoules').value)
    };

    if (isNaN(payload.amount)) { alert("Please enter a valid amount."); return; }

    try {
        saveBtn.disabled = true;
        if (pushSwitch.checked) {
            const swRes = await fetch('/api/expense/splitwise', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!swRes.ok) {
                const swData = await swRes.json();
                if (!confirm(`Splitwise Push Failed: ${swData.error}. Save locally anyway?`)) {
                    saveBtn.disabled = false;
                    return;
                }
            }
        }

        const res = await fetch('/api/expense/manual', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            alert("Transaction Recorded Successfully!");
            document.getElementById('manualForm').reset();
            document.getElementById('expDate').valueAsDate = new Date();
            setSplit(50, 50);
        } else {
            alert("Error saving transaction locally.");
        }
    } catch (err) {
        alert("A critical error occurred while saving.");
    } finally {
        saveBtn.disabled = false;
    }
}

async function saveSaving() {
    const payload = {
        date: document.getElementById('savDate').value,
        description: document.getElementById('savDesc').value,
        amount: parseFloat(document.getElementById('savAmt').value),
        category_id: document.getElementById('savCat').value
    };

    if (isNaN(payload.amount) || payload.amount <= 0) {
        alert("Please enter a valid amount.");
        return;
    }

    const res = await fetch('/api/savings/manual', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });

    if (res.ok) {
        alert("Saving/Investment Recorded!");
        document.getElementById('savingsForm').reset();
        document.getElementById('savDate').valueAsDate = new Date();
    } else {
        const err = await res.json();
        alert("Error: " + err.error);
    }
}
</script>
{% endblock %}
